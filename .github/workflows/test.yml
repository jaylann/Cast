name: Test

on:
  push:
    branches: [stage, main]
  pull_request:
    branches: [stage]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test

      - name: Verify DocC examples are in sync with Examples/Sources/
        run: |
          ./scripts/generate-example-docs.sh
          if ! git diff --exit-code Sources/Cast/Cast.docc/Examples/; then
            echo "::error::Sources/Cast/Cast.docc/Examples/ is out of sync with Examples/Sources/. Run ./scripts/generate-example-docs.sh and commit the result."
            exit 1
          fi
          if [ -n "$(git status --porcelain Sources/Cast/Cast.docc/Examples/)" ]; then
            echo "::error::Sources/Cast/Cast.docc/Examples/ contains untracked files after regeneration. Run ./scripts/generate-example-docs.sh and commit the new article(s)."
            git status --porcelain Sources/Cast/Cast.docc/Examples/
            exit 1
          fi
