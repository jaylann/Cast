name: Examples

on:
  push:
    branches: [stage]
    paths:
      - 'Sources/Cast/**'
      - 'Examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    branches: [stage]
    paths:
      - 'Sources/Cast/**'
      - 'Examples/**'
      - '.github/workflows/examples.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Examples
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build examples
        working-directory: Examples
        run: swift build
