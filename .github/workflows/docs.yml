name: Deploy DocC to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build DocC
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Regenerate example articles from Examples/
        run: ./scripts/generate-example-docs.sh

      - name: Build DocC archive
        run: |
          swift package --allow-writing-to-directory ./_site \
            generate-documentation \
            --target Cast \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path Cast \
            --output-path ./_site

      - name: Add root redirect to /documentation/cast/
        run: |
          cat > ./_site/index.html <<'EOF'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=./documentation/cast/">
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
