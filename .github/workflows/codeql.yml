name: CodeQL

on:
  push:
    branches: [stage]
  schedule:
    # Weekly Sunday at 03:17 UTC — off-peak, avoids the top-of-hour spike.
    - cron: '17 3 * * 0'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build
        run: swift build

      - name: Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
