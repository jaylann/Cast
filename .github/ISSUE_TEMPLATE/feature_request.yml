name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide details.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature do you want and why?
      placeholder: "I'd like the ability to..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Who benefits and how would they use this?
      placeholder: "Developers who need to extract structured data would..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Be specific.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which subsystem does this affect? Maps to the `area:*` label taxonomy.
      options:
        - "api — Public surface (CastModel, property wrappers, CastError)"
        - "macro — @Castable macro (Sources/CastMacros)"
        - "grammar — Grammar rules / state machines"
        - "sampler — Constrained sampler / logit masking"
        - "tokenizer — Tokenizer binding / cache"
        - "prompt — Prompt engine / chat templates"
        - "schema — JSON schema generation"
        - "safety — GPU lifecycle, error handling, cancellation"
        - "mlx — MLX Swift integration / vendored MLXStructured"
        - "examples — Examples/ subpackage"
        - "docs — DocC, README, ADRs"
        - "performance — Cross-cutting perf"
        - "compat — Model / platform compatibility"
        - "ci — Workflows / build infra"
        - "tooling — Developer tooling / scripts"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know when this is done?
      placeholder: |
        - [ ] User can...
        - [ ] System should...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Code examples, references, or related issues
