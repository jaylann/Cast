name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out all required fields.

        > **Security issues**: do not file a public bug — use [private vulnerability reporting](https://github.com/jaylann/Cast/security/advisories/new) instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's happening and what should happen instead?
      placeholder: "Cast crashes when generating output for..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Define a @Castable struct with...
        2. Call model.cast(...)
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which subsystem is affected? Maps to the `area:*` label taxonomy.
      options:
        - "api — Public surface (CastModel, property wrappers, CastError)"
        - "macro — @Castable macro (Sources/CastMacros)"
        - "grammar — Grammar rules / state machines"
        - "sampler — Constrained sampler / logit masking"
        - "tokenizer — Tokenizer binding / cache"
        - "prompt — Prompt engine / chat templates"
        - "schema — JSON schema generation"
        - "safety — GPU lifecycle, error handling, cancellation"
        - "mlx — MLX Swift integration / vendored MLXStructured"
        - "examples — Examples/ subpackage"
        - "docs — DocC, README, ADRs"
        - "performance — Cross-cutting perf"
        - "compat — Model / platform compatibility"
        - "ci — Workflows / build infra"
        - "tooling — Developer tooling / scripts"
        - "Other / not sure"
    validations:
      required: true

  - type: input
    id: swift-version
    attributes:
      label: Swift Version
      placeholder: "6.0"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: "15.2"
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: MLX Model Used
      placeholder: "mlx-community/Qwen3-1.5B-4bit"

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant error messages or stack traces
      render: shell
