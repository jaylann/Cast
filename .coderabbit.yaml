language: en
early_access: false
tone_instructions: "Be terse, direct, and technically rigorous. Prefer fixing root causes over patching symptoms. Don't add congratulatory or filler language."

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "stage"

  path_filters:
    - "!_site/**"
    - "!.build/**"
    - "!Package.resolved"
    - "!Sources/CMLXStructured/xgrammar/**"
    - "!Sources/MLXStructured/**"
    - "!**/*.lock"
    - "!**/*.png"
    - "!**/*.jpg"
    - "!**/*.svg"

  path_instructions:
    - path: "Sources/CastMacros/**"
      instructions: |
        SwiftSyntax macro target. Critical rules to enforce:
        - `@attached(member, names:)` MUST list every synthesized name explicitly
          (`named(castSchema)`, `named(init)`, `named(PartiallyGenerated)`, ...).
          A new synthesized member without an entry silently fails — the macro emits
          the decl but the compiler hides it from consumers.
        - `CastableDiagnostic` supports per-case severity. The early-return guard
          MUST filter on `severity == .error`, not `diagnostics.isEmpty`. Otherwise
          a new `.warning` case silently blocks all macro expansion.
        - New warning diagnostic cases require both `DiagnosticSpec(severity: .warning)`
          AND a full `expandedSource` assertion in their test.

    - path: "Sources/Cast/API/**"
      instructions: |
        Public API surface. Rules:
        - Swift 6 strict-concurrency, value types by default.
        - No force-unwraps (`!`), force-tries (`try!`), force-casts (`as!`) — flag every one.
        - Naming suffixes: Engine, Processor, Builder, Cache, Provider, Compiler.
          Protocols use `-ing` suffix.
        - New methods land in the right `CastModel+<Surface>.swift` per CONTRIBUTING.md.
          A new surface = a new file, not overloading an existing one.
        - Comments explain WHY not WHAT. Default to none.

    - path: "Tests/**"
      instructions: |
        Swift Testing framework (`import Testing`), not XCTest.
        - Use `#expect` / `#require`. Never force-unwrap in tests.
        - MLX runtime tests MUST use the `.requiresMetal` trait — CI runners
          (macos-15) can't load Metal and crash with "Failed to load the default
          metallib". Macro/schema/property-wrapper/validator/prompt-engine/
          JSON-repair tests do NOT need this trait.

    - path: "Examples/**"
      instructions: |
        Examples package has its own Package.swift and is build-only in CI
        (.github/workflows/examples.yml — no auto-run). Each example is
        Examples/Sources/<Name>/main.swift. New examples must also have a
        Cast.docc/Examples/<Name>.md mirror (regenerated by
        scripts/generate-example-docs.sh) and a `<doc:Name>` entry in Cast.docc/Cast.md.

    - path: "Package.swift"
      instructions: |
        - Sources/MLXStructured/LICENSE must be in the MLXStructured target's
          `exclude:` list — SPM otherwise emits an "unhandled file" warning.
        - Every @Castable consumer (library or test target) needs `JSONSchema` +
          `Collections` in dependencies.

    - path: "docs/decisions/**"
      instructions: |
        ADRs follow the NNNN-kebab-case-title.md convention. Number sequentially.
        Status: Accepted | Deprecated | Superseded by NNNN.

    - path: ".github/workflows/**"
      instructions: |
        - macOS runners must stay on `macos-15` (free for public repos).
        - Never switch to `macos-15-large` / `-xlarge` — those are billed even
          on public repos.
        - Third-party actions (anything not under `actions/` or `github/`) should
          be SHA-pinned with a `# vX.Y.Z` comment. Official `actions/*` may use
          major-version tags.

chat:
  auto_reply: true
